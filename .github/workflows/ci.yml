name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: telegram-voice-transcriber-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: pytest --cov=telegram_voice_transcriber --cov-report=term-missing --cov-report=xml

      - name: Install build tooling
        run: python -m pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-build-artifacts
          path: |
            dist/
            coverage.xml
          if-no-files-found: ignore
